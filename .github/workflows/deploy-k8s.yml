name: Deploy Kubernetes with Kubespray

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TF_VAR_token: ${{ secrets.YC_TOKEN }}
  TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
  TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      # Для бэкенда S3
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (create infrastructure)
        run: terraform apply -auto-approve

      - name: Show inventory file
        run: cat inventory.ini

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone Kubespray
        run: |
          if [ ! -d "kubespray" ]; then
            git clone https://github.com/kubernetes-sigs/kubespray.git
          fi

      - name: Install Ansible dependencies
        run: |
          cd kubespray
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run Kubespray playbook
        run: |
          # Запускаем ssh-agent и добавляем ключ из секрета
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | ssh-add -
          
          cd kubespray
          source venv/bin/activate
          ansible-playbook -i ../inventory.ini \
            cluster.yml \
            -b -v \
            --user ubuntu
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Find and copy kubeconfig
        run: |
          mkdir -p ~/.kube
          ADMIN_CONF=$(find kubespray -name "admin.conf" -type f | head -n1)
          if [ -z "$ADMIN_CONF" ]; then
            echo "admin.conf not found"
            exit 1
          fi
          cp "$ADMIN_CONF" ~/.kube/config
      
      - name: Fix kubeconfig server address
        run: |
          # Получаем публичный IP мастер-ноды из output Terraform
          MASTER_IP=$(terraform output -raw master_ip)
          sed -i "s/127.0.0.1/$MASTER_IP/g" ~/.kube/config
          sed -i "s/10\.[0-9.]\+/$MASTER_IP/g" ~/.kube/config
          kubectl cluster-info  # проверка
      
      - name: Verify cluster access
        run: kubectl get nodes
            
      
      - name: Get kubeconfig from Kubespray artifacts
        run: |
            mkdir -p ~/.kube
            cp kubespray/inventory/mycluster/artifacts/admin.conf ~/.kube/config
      
      - name: Verify cluster access
        run: kubectl get nodes

      - name: Deploy kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --set grafana.service.type=NodePort \
            --set grafana.service.nodePort=31000
